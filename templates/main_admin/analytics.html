<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Main Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d0d1a; color: #e0e0e0; }
        .sidebar { background: #1a0533; min-height: 100vh; position: fixed; width: 250px; }
        .sidebar-header { background: #2d0a5e; padding: 20px; text-align: center; color: white; }
        .sidebar-menu a { display: block; padding: 15px 20px; color: #ccc; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: #2d0a5e; color: white; }
        .main-content { margin-left: 250px; padding: 20px; }
        .chart-card { background: #1a1a2e; border-radius: 10px; border: 1px solid #2d0a5e; padding: 20px; margin-bottom: 20px; }
        h4, h5 { color: #b44fff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h6>🏛️ TN Rural Helpline</h6>
            <small>Main Admin Panel</small>
        </div>
        <div class="sidebar-menu">
            <a href="/accounts/main-admin/dashboard/"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
            <a href="/accounts/main-admin/complaints/"><i class="fas fa-list me-2"></i> All Complaints</a>
            <a href="/accounts/main-admin/users/"><i class="fas fa-users me-2"></i> Users</a>
            <a href="/accounts/main-admin/analytics/" class="active"><i class="fas fa-chart-bar me-2"></i> Analytics</a>
            <a href="/accounts/logout/"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <h4 class="mb-4"><i class="fas fa-chart-bar me-2"></i> Analytics Dashboard</h4>

        <div class="row">
            <div class="col-md-6">
                <div class="chart-card">
                    <h5>Category Wise Complaints</h5>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card">
                    <h5>District Wise Complaints</h5>
                    <canvas id="districtChart"></canvas>
                </div>
            </div>
            <div class="col-md-12">
                <div class="chart-card">
                    <h5>Monthly Trend</h5>
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        try {
            const categoryData = {{ category_data|safe }};
            const categoryLabels = categoryData.map(function(d) { return d.category__name || 'Unknown'; });
            const categoryValues = categoryData.map(function(d) { return d.total; });

            new Chart(document.getElementById('categoryChart'), {
                type: 'bar',
                data: {
                    labels: categoryLabels,
                    datasets: [{
                        label: 'Complaints',
                        data: categoryValues,
                        backgroundColor: '#b44fff',
                    }]
                },
                options: {
                    plugins: { legend: { labels: { color: '#e0e0e0' } } },
                    scales: {
                        x: { ticks: { color: '#e0e0e0' } },
                        y: { ticks: { color: '#e0e0e0' }, beginAtZero: true }
                    }
                }
            });
        } catch(e) { console.log('Category chart error:', e); }

        try {
            const districtData = {{ district_data|safe }};
            const districtLabels = districtData.map(function(d) { return d.district || 'Unknown'; });
            const districtValues = districtData.map(function(d) { return d.count; });

            new Chart(document.getElementById('districtChart'), {
                type: 'doughnut',
                data: {
                    labels: districtLabels,
                    datasets: [{
                        data: districtValues,
                        backgroundColor: ['#b44fff','#7c3aed','#4f46e5','#0ea5e9','#10b981','#f59e0b','#ef4444'],
                    }]
                },
                options: {
                    plugins: { legend: { labels: { color: '#e0e0e0' } } }
                }
            });
        } catch(e) { console.log('District chart error:', e); }

        try {
            const monthlyData = {{ monthly_data|safe }};
            const monthlyLabels = monthlyData.map(function(d) { return d.month || ''; });
            const monthlyValues = monthlyData.map(function(d) { return d.count; });

            new Chart(document.getElementById('monthlyChart'), {
                type: 'line',
                data: {
                    labels: monthlyLabels,
                    datasets: [{
                        label: 'Complaints per Month',
                        data: monthlyValues,
                        borderColor: '#b44fff',
                        backgroundColor: 'rgba(180,79,255,0.2)',
                        fill: true,
                    }]
                },
                options: {
                    plugins: { legend: { labels: { color: '#e0e0e0' } } },
                    scales: {
                        x: { ticks: { color: '#e0e0e0' } },
                        y: { ticks: { color: '#e0e0e0' }, beginAtZero: true }
                    }
                }
            });
        } catch(e) { console.log('Monthly chart error:', e); }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
