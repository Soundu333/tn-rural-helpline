<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Main Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d0d1a; color: white; }
        .sidebar {
            background: #1a0533;
            min-height: 100vh;
            padding: 0;
            position: fixed;
            width: 220px;
        }
        .sidebar-header {
            background: #2d0a5e;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .sidebar-menu a {
            display: block;
            padding: 12px 20px;
            color: #ccc;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: #2d0a5e;
            color: white;
        }
        .main-content {
            margin-left: 220px;
            padding: 20px;
        }
        .chart-card {
            background: #1a1a2e;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2d2d4e;
        }
        .chart-card h6 {
            color: #ccc;
            margin-bottom: 15px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h6>🏛️ TN Rural Helpline</h6>
            <small>Main Admin Panel</small>
        </div>
        <div class="sidebar-menu">
            <a href="/accounts/main-admin/dashboard/"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
            <a href="/accounts/main-admin/complaints/"><i class="fas fa-list me-2"></i> All Complaints</a>
            <a href="/accounts/main-admin/users/"><i class="fas fa-users me-2"></i> Users</a>
            <a href="/accounts/main-admin/analytics/" class="active"><i class="fas fa-chart-bar me-2"></i> Analytics</a>
            <a href="/accounts/logout/"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <h5 class="mb-4">📊 Analytics Dashboard</h5>

        <div class="row">
            <div class="col-md-6">
                <div class="chart-card">
                    <h6>📈 Monthly Complaint Trends</h6>
                    <canvas id="monthlyChart" height="200"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card">
                    <h6>📊 Category wise - Total vs Resolved</h6>
                    <canvas id="categoryChart" height="200"></canvas>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="chart-card">
                    <h6>🗺️ Top 10 Districts - Complaint Count</h6>
                    <canvas id="districtChart" height="100"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Monthly Chart
        const monthlyData = {{ monthly_data|safe }};
        new Chart(document.getElementById('monthlyChart'), {
            type: 'line',
            data: {
                labels: monthlyData.map(d => {
                    const date = new Date(d.month);
                    return date.toLocaleString('default', { month: 'short', year: '2-digit' });
                }),
                datasets: [{
                    label: 'Complaints',
                    data: monthlyData.map(d => d.count),
                    borderColor: '#b44fff',
                    backgroundColor: 'rgba(180,79,255,0.2)',
                    tension: 0.4,
                    fill: true,
                }]
            },
            options: {
                plugins: { legend: { labels: { color: '#ccc' } } },
                scales: {
                    x: { ticks: { color: '#ccc' }, grid: { color: '#2d2d4e' } },
                    y: { ticks: { color: '#ccc' }, grid: { color: '#2d2d4e' } }
                }
            }
        });

        // Category Chart
        const categoryData = {{ category_data|safe }};
        new Chart(document.getElementById('categoryChart'), {
            type: 'bar',
            data: {
                labels: categoryData.map(d => d.category__name || 'Unknown'),
                datasets: [
                    {
                        label: 'Total',
                        data: categoryData.map(d => d.total),
                        backgroundColor: '#b44fff',
                        borderRadius: 5,
                    },
                    {
                        label: 'Resolved',
                        data: categoryData.map(d => d.resolved),
                        backgroundColor: '#44ff88',
                        borderRadius: 5,
                    }
                ]
            },
            options: {
                plugins: { legend: { labels: { color: '#ccc' } } },
                scales: {
                    x: { ticks: { color: '#ccc' }, grid: { color: '#2d2d4e' } },
                    y: { ticks: { color: '#ccc' }, grid: { color: '#2d2d4e' } }
                }
            }
        });

        // District Chart
        const districtData = {{ district_data|safe }};
        new Chart(document.getElementById('districtChart'), {
            type: 'bar',
            data: {
                labels: districtData.map(d => d.district || 'Unknown'),
                datasets: [{
                    label: 'Complaints',
                    data: districtData.map(d => d.count),
                    backgroundColor: '#ff6b9d',
                    borderRadius: 5,
                }]
            },
            options: {
                plugins: { legend: { labels: { color: '#ccc' } } },
                scales: {
                    x: { ticks: { color: '#ccc' }, grid: { color: '#2d2d4e' } },
                    y: { ticks: { color: '#ccc' }, grid: { color: '#2d2d4e' } }
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
